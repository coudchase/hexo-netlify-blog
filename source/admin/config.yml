backend:
  name: github
  repo: coudchase/hexo-netlify-blog # 替换成你的 GitHub 仓库地址
  branch: main # 或者 main，根据你的主分支名
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "source/images" # 图片上传后存放的文件夹
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "source/_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "正文", name: "body", widget: "markdown"}
